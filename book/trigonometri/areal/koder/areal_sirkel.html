<div style="font-family: sans-serif; text-align: center; background: #1e1e1e; color: #f0f0f0; padding: 20px; border-radius: 8px; border: 1px solid #333;">
    <h3 style="margin-top: 0; color: #ffffff;">Areal av sirkel: Fra sirkel til rektangel</h3>
    
    <div style="margin-bottom: 20px;">
        <label for="sliceSlider" style="font-size: 1.1em;">Antall biter (n): <span id="sliceCount" style="font-weight: bold; color: #60a5fa;">8</span></label>
        <br>
        <input type="range" id="sliceSlider" min="4" max="100" step="2" value="8" style="width: 300px; margin-top: 10px;">
    </div>

    <canvas id="circleCanvas" width="700" height="280" style="border: 1px solid #444; background: #252526; border-radius: 4px;"></canvas>
    
    <p style="color: #cccccc; font-size: 1em; line-height: 1.5; max-width: 700px; margin: 20px auto 0;">
        Når vi deler sirkelen i flere biter, omformes den til et rektangel med høyde <i>r</i> og bredde <i>πr</i>.
    </p>
</div>

<script>
    const canvas = document.getElementById('circleCanvas');
    const ctx = canvas.getContext('2d');
    const slider = document.getElementById('sliceSlider');
    const countLabel = document.getElementById('sliceCount');

    // Mål og posisjoner
    const radius = 100;
    const circleCenter = { x: 140, y: 140 };
    const rectCenter = { x: 500, y: 140 }; 
    
    // Dark mode tilpassede farger - konsistente blå nyanser fra boken
    const colors = ['#3b82f6', '#2563eb']; 
    const strokeColor = '#1e1e1e'; // Samme som bakgrunnen for å gi usynlige skjøter

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const n = parseInt(slider.value);
        const alpha = Math.PI / n; // Halvvinkelen til hver kile

        // 1. Tegn opprinnelig sirkel
        for (let i = 0; i < n; i++) {
            ctx.beginPath();
            ctx.moveTo(circleCenter.x, circleCenter.y);
            // Hver kile har en vinkel på 2 * alpha
            ctx.arc(circleCenter.x, circleCenter.y, radius, i * 2 * alpha, (i + 1) * 2 * alpha);
            ctx.closePath();
            ctx.fillStyle = colors[i % 2];
            ctx.fill();
            // Don't stroke to avoid black dot artifact at center
        }

        // 2. Tegn omorganisert "parallellogram" som nærmer seg et rektangel
        // For at de skal passe perfekt i hverandre, er høyden litt mindre enn r
        const rectHeight = radius * Math.cos(alpha);
        
        // Den totale bredden av formen (fysisk avstand fra venstre til høyre hjørne)
        const shapeWidth = (n + 1) * radius * Math.sin(alpha);
        
        // Sentrerer formen
        const startX = rectCenter.x - shapeWidth / 2;
        const yBottom = rectCenter.y + rectHeight / 2;
        const yTop = rectCenter.y - rectHeight / 2;

        for (let i = 0; i < n; i++) {
            ctx.beginPath();
            // X-posisjonen til spissen av trekanten
            const tipX = startX + (i + 1) * radius * Math.sin(alpha);
            
            if (i % 2 === 0) {
                // Partall: Peker OPP (spissen er nede, buen er oppe)
                ctx.moveTo(tipX, yBottom);
                ctx.arc(tipX, yBottom, radius, -Math.PI/2 - alpha, -Math.PI/2 + alpha);
            } else {
                // Oddetall: Peker NED (spissen er oppe, buen er nede)
                ctx.moveTo(tipX, yTop);
                ctx.arc(tipX, yTop, radius, Math.PI/2 - alpha, Math.PI/2 + alpha);
            }
            
            ctx.closePath();
            ctx.fillStyle = colors[i % 2];
            ctx.fill();
            ctx.strokeStyle = strokeColor;
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }
        
        // 3. Tegn den stiplede rammen for rektangelet det nærmer seg i grenseverdien
        ctx.strokeStyle = '#60a5fa';
        ctx.lineWidth = 2.5;
        ctx.setLineDash([8, 4]);
        const limitWidth = Math.PI * radius;
        ctx.strokeRect(rectCenter.x - limitWidth / 2, rectCenter.y - radius / 2, limitWidth, radius);
        ctx.setLineDash([]);
        
        // Tekst-etiketter for rammen
        ctx.fillStyle = '#f0f0f0';
        ctx.font = '16px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
        ctx.textAlign = 'center';
        
        // Bredde label
        const breadthText = 'Bredde ≈ π r';
        const breadthX = rectCenter.x;
        const breadthY = rectCenter.y - radius / 2 - 15;
        ctx.fillText(breadthText, breadthX, breadthY);
        
        // Høyde label - positioned on left side to stay visible
        const heightText = 'Høyde ≈ r';
        const heightX = rectCenter.x - limitWidth / 2 - 20;
        const heightY = rectCenter.y + 5;
        ctx.textAlign = 'right';
        ctx.fillText(heightText, heightX, heightY);
    }

    slider.addEventListener('input', (e) => {
        countLabel.textContent = e.target.value;
        draw();
    });

    // Tegn ved oppstart
    draw();
</script>
